apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: ecommerce-microservices-order-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3003
          env:
            - name: USER_SERVICE_URL
              value: "http://user-service:3001"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:3002"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: 3003
      targetPort: 3003
  type: ClusterIP
