version: '3.8'

services:

  user-service:
    build: ./user-service
    ports:
      - "3001:3001"
    networks:
      - ecommerce-network

  product-service:
    build: ./product-service
    ports:
      - "3002:3002"
    networks:
      - ecommerce-network

  order-service:
    build: ./order-service
    ports:
      - "3003:3003"
    environment:
      - USER_SERVICE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
    depends_on:
      - user-service
      - product-service
    networks:
      - ecommerce-network

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - user-service
      - product-service
      - order-service
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge
